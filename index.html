<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light dark">
<title>Checklist</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #fff; --text: #333; --text2: #555; --text3: #999;
    --border: #e0e0e0; --hover: #e8e8e8; --ring-bg: #eee; --bar-bg: #f0f0f0;
    --check-bg: #d4edda; --check-border: #66BB6A; --accent: #1a73e8;
    --shadow: rgba(0,0,0,0.04); --shadow2: rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root.auto-dark {
      --bg: #1a1a1a; --card: #2a2a2a; --text: #e0e0e0; --text2: #bbb; --text3: #777;
      --border: #3a3a3a; --hover: #3a3a3a; --ring-bg: #3a3a3a; --bar-bg: #333;
      --check-bg: #1a3a1a; --check-border: #66BB6A; --accent: #5b9cf5;
      --shadow: rgba(0,0,0,0.2); --shadow2: rgba(0,0,0,0.3);
    }
  }
  :root.force-dark {
    --bg: #1a1a1a; --card: #2a2a2a; --text: #e0e0e0; --text2: #bbb; --text3: #777;
    --border: #3a3a3a; --hover: #3a3a3a; --ring-bg: #3a3a3a; --bar-bg: #333;
    --check-bg: #1a3a1a; --check-border: #66BB6A; --accent: #5b9cf5;
    --shadow: rgba(0,0,0,0.2); --shadow2: rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

  /* Cover */
  #cover {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; gap: 16px; padding: 20px;
  }
  #cover h1 { font-size: 22px; margin-bottom: 20px; color: var(--text2); }
  .profile-btn {
    width: 200px; padding: 18px; border: none; border-radius: 12px;
    font-size: 20px; font-weight: 600; cursor: pointer;
    background: var(--card); box-shadow: 0 2px 8px var(--shadow2); color: var(--text);
  }
  .profile-btn:active { transform: scale(0.97); }

  /* App */
  #app { display: none; min-height: 100dvh; flex-direction: column; }
  #app.visible { display: flex; }

  /* Header */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .top-bar h1 { font-size: 17px; font-weight: 600; flex: 1; text-align: center; color: var(--text); }
  .nav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 10px; color: var(--text2); }
  .back-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--accent); padding: 4px 8px; }
  #profileBar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .profile-toggle {
    display: flex; border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
  }
  .profile-toggle button {
    border: none; padding: 5px 16px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease;
    background: var(--bar-bg); color: var(--text3);
  }
  .profile-toggle button + button { border-left: 1px solid var(--border); }
  .profile-toggle button.active {
    background: var(--accent); color: #fff; font-weight: 600;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }
  .profile-toggle button:not(.active):active { background: var(--hover); }
  .dark-toggle {
    background: var(--bar-bg); border: none; padding: 4px 10px; border-radius: 12px;
    font-size: 15px; cursor: pointer; line-height: 1;
  }
  .dark-toggle:active { background: var(--hover); }


  /* Month */
  #monthView { padding: 8px; }
  .weekday-headers { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 6px 0; }
  .weekday-headers span { font-size: 11px; color: var(--text3); font-weight: 500; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .month-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 8px; cursor: pointer; gap: 1px; color: var(--text);
    position: relative;
  }
  .month-day:active { background: var(--hover); }
  .month-day.other-month { color: var(--text3); opacity: 0.5; }
  .month-day.today .day-num { font-weight: 700; color: var(--accent); }
  .ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .ring-wrap .wafaa-check { position: absolute; font-size: 9px; color: #66BB6A; font-weight: 700; line-height: 1; }
  .month-day .long-press-hint {
    position: absolute; inset: 0; border-radius: 8px;
    background: rgba(102, 187, 106, 0.15); pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  .month-day.lp-active .long-press-hint { opacity: 1; }

  /* Today button */
  .today-btn {
    background: none; border: none; font-size: 11px; cursor: pointer;
    color: var(--accent); padding: 2px 6px; font-weight: 600;
  }

  /* Slide transitions */
  .view-container { position: relative; overflow: hidden; flex: 1; }
  .view-container.animating #monthView,
  .view-container.animating #dayView {
    position: absolute; top: 0; left: 0; width: 100%;
  }
  .animating #monthView, .animating #dayView {
    transition: transform 0.25s ease, opacity 0.25s ease;
  }
  .slide-out-left { transform: translateX(-100%); opacity: 0; }
  .slide-in-right { transform: translateX(100%); opacity: 0; }
  .slide-out-right { transform: translateX(100%); opacity: 0; }
  .slide-in-left { transform: translateX(-100%); opacity: 0; }

  /* Day */
  #dayView { padding: 12px 16px; touch-action: pan-y; display: flex; flex-direction: column; min-height: 0; }
  #dayView.visible-flex { display: flex; }
  .item-row {
    display: flex; align-items: center; padding: 14px 16px; margin-bottom: 6px;
    background: var(--card); border-radius: 10px; cursor: pointer;
    box-shadow: 0 1px 2px var(--shadow);
    transition: transform 0.15s ease;
  }
  .item-row:active { background: var(--hover); transform: scale(0.98); }
  .item-row .item-label { flex: 1; font-size: 16px; direction: rtl; text-align: right; }
  .item-row .item-check {
    width: 28px; height: 28px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 18px;
    border: 2px solid #ddd; margin-left: 12px; flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .item-row .item-check.checked { background: var(--check-bg); border-color: var(--check-border); color: #fff; font-weight: 700; }
  .day-summary {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 12px; margin-top: auto; color: var(--text3); font-size: 15px;
  }

  /* Day nav arrows */
  .day-nav { display: flex; justify-content: space-between; padding: 0 4px; margin-top: 8px; }
  .day-nav button {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; font-size: 13px; color: var(--text2); cursor: pointer;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .day-nav button:active { background: var(--hover); }

  /* Loading overlay */
  #loadingOverlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(2px);
  }
  #loadingOverlay.active { display: flex; }
  .spinner {
    width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div id="cover">
  <h1>المتابعة اليومية</h1>
  <button class="profile-btn" data-profile="khawla">خولة</button>
  <button class="profile-btn" data-profile="jihad">جهاد</button>
</div>

<div id="app">
  <div id="profileBar">
    <div class="profile-toggle">
      <button class="profile-radio" data-profile="khawla">خولة</button>
      <button class="profile-radio" data-profile="jihad">جهاد</button>
    </div>
    <button class="dark-toggle" id="darkToggle">🌙</button>
  </div>

  <div class="top-bar" id="navBar">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <h1 id="headerTitle"></h1>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>

  <div class="top-bar" id="dayBar" style="display:none">
    <button class="back-btn" id="backBtn">&#8592; Back</button>
    <h1 id="dayTitle"></h1>
    <div style="width:50px"></div>
  </div>


  <div class="view-container">
    <div id="monthView"></div>
    <div id="dayView" style="display:none"></div>
  </div>
</div>

<div id="loadingOverlay"><div class="spinner"></div></div>
<script>
const API = 'https://zotgjq5acj.execute-api.eu-central-1.amazonaws.com/';
const PROFILES = { khawla: 'خولة', jihad: 'جهاد' };
const ITEMS = [
  { id: 'fajr', label: 'سنة الفجر' },
  { id: 'maghrib', label: 'سنة المغرب' },
  { id: 'shaf', label: 'الشفع والوتر' },
  { id: 'istighfar', label: 'الاستغفار' },
  { id: 'duha', label: 'الضحى' },
  { id: 'quran', label: 'قراءة القرآن' },
  { id: 'kahf', label: 'سورة الكهف' },
  { id: 'wafaa', label: 'وفاء بالوعد', profile: 'jihad' },
];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let data = {};
let view = 'month';
let currentDate = new Date();
let currentProfile = null;
let selectedDay = null;

const $ = id => document.getElementById(id);
const dateKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const isToday = d => dateKey(d) === dateKey(new Date());
const isFriday = d => d.getDay() === 5;

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

function itemsForDate(d) {
  return ITEMS.filter(i => {
    if (i.id === 'kahf' && !isFriday(d)) return false;
    if (i.profile && i.profile !== currentProfile) return false;
    return true;
  });
}

function progressForDate(d) {
  const k = dateKey(d);
  const items = itemsForDate(d);
  const dayData = data[k] || {};
  const done = items.filter(i => dayData[i.id]).length;
  return { done, total: items.length };
}

function progressColor(done, total) {
  if (total === 0 || done === 0) return 'var(--ring-bg)';
  const pct = done / total;
  if (pct < 0.5) return '#FFA726';
  if (pct < 1) return '#42A5F5';
  return '#66BB6A';
}

function progressRing(done, total, size) {
  const r = size / 2 - 2, c = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : done / total;
  const color = progressColor(done, total);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring-bg)" stroke-width="2"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="2"
      stroke-dasharray="${c * pct} ${c}" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="round"/>
  </svg>`;
}

// --- API ---
async function load() {
  $('loadingOverlay').classList.add('active');
  try { data = await fetch(API + currentProfile).then(r => r.json()); } catch(e) { console.error('Load failed', e); }
  $('loadingOverlay').classList.remove('active');
  render();
}
async function save() {
  try { await fetch(API + currentProfile, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); } catch(e) { console.error('Save failed', e); }
}

// --- Profile ---
function updateProfileButtons() {
  document.querySelectorAll('.profile-radio').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.profile === currentProfile);
  });
}

function selectProfile(p) {
  currentProfile = p;
  data = {};
  localStorage.setItem('checklist-profile', p);
  updateProfileButtons();
  $('cover').style.display = 'none';
  $('app').classList.add('visible');
  currentDate = new Date();
  selectedDay = new Date();
  showView('day');
  load();
}

document.querySelectorAll('.profile-btn').forEach(btn => {
  btn.addEventListener('click', () => selectProfile(btn.dataset.profile));
});
document.querySelectorAll('.profile-radio').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.profile !== currentProfile) {
      selectProfile(btn.dataset.profile);
    }
  });
});

// --- Dark Mode ---
let darkMode = localStorage.getItem('checklist-dark') || 'auto';
function applyDark() {
  document.documentElement.classList.remove('auto-dark', 'force-dark');
  if (darkMode === 'auto') document.documentElement.classList.add('auto-dark');
  else if (darkMode === 'on') document.documentElement.classList.add('force-dark');
  $('darkToggle').textContent = darkMode === 'on' ? '🌙' : darkMode === 'off' ? '☀️' : '🌗';
}
$('darkToggle').addEventListener('click', () => {
  darkMode = darkMode === 'auto' ? 'on' : darkMode === 'on' ? 'off' : 'auto';
  localStorage.setItem('checklist-dark', darkMode);
  applyDark();
});
applyDark();

// --- View Management ---
let transitioning = false;
let dayTransitioning = false;

function showView(v, direction) {
  if (transitioning && direction) return;
  transitioning = false;
  dayTransitioning = false;
  const oldView = view;
  view = v;

  const monthEl = $('monthView');
  const dayEl = $('dayView');

  $('navBar').style.display = v === 'day' ? 'none' : '';
  $('dayBar').style.display = v === 'day' ? '' : 'none';

  const container = document.querySelector('.view-container');

  // Reset any leftover inline styles from interrupted animations
  dayEl.style.transition = '';
  dayEl.style.transform = '';
  dayEl.style.opacity = '';
  monthEl.style.transition = '';
  monthEl.style.transform = '';
  monthEl.style.opacity = '';
  container.classList.remove('animating');
  monthEl.classList.remove('slide-out-left', 'slide-out-right', 'slide-in-left', 'slide-in-right');
  dayEl.classList.remove('slide-out-left', 'slide-out-right', 'slide-in-left', 'slide-in-right');

  if (direction && oldView !== v) {
    transitioning = true;
    const outEl = oldView === 'month' ? monthEl : dayEl;
    const inEl = v === 'month' ? monthEl : dayEl;

    // Render the incoming view first
    if (v === 'month') renderMonth();
    else renderDay();

    container.classList.add('animating');
    inEl.style.display = '';
    inEl.classList.add(direction === 'left' ? 'slide-in-right' : 'slide-in-left');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        outEl.classList.add(direction === 'left' ? 'slide-out-left' : 'slide-out-right');
        inEl.classList.remove('slide-in-right', 'slide-in-left');

        setTimeout(() => {
          outEl.style.display = 'none';
          outEl.classList.remove('slide-out-left', 'slide-out-right');
          container.classList.remove('animating');
          transitioning = false;
        }, 260);
      });
    });
  } else {
    monthEl.style.display = v === 'month' ? '' : 'none';
    dayEl.style.display = v === 'day' ? '' : 'none';
    render();
  }
}

function openDay(d) {
  selectedDay = new Date(d);
  showView('day', 'left');
}

function goBack() {
  showView('month', 'right');
}

function render() {
  if (view === 'month') renderMonth();
  else if (view === 'day') renderDay();
}

// --- Month View ---
function renderMonth() {
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const now = new Date();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  const todayBtn = isCurrentMonth ? '' : `<button class="today-btn" id="todayBtn">Today</button>`;
  $('headerTitle').innerHTML = `${MONTHS[month]} ${year} ${todayBtn}`;

  if (!isCurrentMonth) {
    const tb = document.getElementById('todayBtn');
    if (tb) tb.addEventListener('click', (e) => {
      e.stopPropagation();
      currentDate = new Date();
      render();
    });
  }

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();

  let html = '<div class="weekday-headers">' + DAYS.map(d => `<span>${d}</span>`).join('') + '</div><div class="month-grid">';

  function addDay(d, extraCls) {
    const { done, total } = progressForDate(d);
    const todayCls = isToday(d) ? ' today' : '';
    const k = dateKey(d);
    const dayData = data[k] || {};
    const showWafaa = currentProfile === 'jihad' && dayData['wafaa'];
    const wafaaMark = showWafaa ? '<span class="wafaa-check">✓</span>' : '';
    const indicator = `<span class="ring-wrap">${progressRing(done, total, 18)}${wafaaMark}</span>`;
    const lpHint = currentProfile === 'jihad' ? '<div class="long-press-hint"></div>' : '';
    html += `<div class="month-day${todayCls}${extraCls}" data-date="${d.toISOString()}" data-key="${k}">
      ${lpHint}<span class="day-num">${d.getDate()}</span>${indicator}
    </div>`;
  }

  for (let i = 0; i < startDay; i++) addDay(new Date(year, month, -(startDay - 1 - i)), ' other-month');
  for (let i = 1; i <= last.getDate(); i++) addDay(new Date(year, month, i), '');
  const remaining = (7 - ((startDay + last.getDate()) % 7)) % 7;
  for (let i = 1; i <= remaining; i++) addDay(new Date(year, month + 1, i), ' other-month');

  html += '</div>';
  $('monthView').innerHTML = html;

  // Click → open day, long-press → toggle wafaa (jihad only)
  $('monthView').querySelectorAll('.month-day').forEach(el => {
    let lpTimer = null;
    let didLongPress = false;

    function startLP(e) {
      didLongPress = false;
      if (currentProfile !== 'jihad') return;
      lpTimer = setTimeout(() => {
        didLongPress = true;
        haptic();
        const k = el.dataset.key;
        if (!data[k]) data[k] = {};
        data[k]['wafaa'] = !data[k]['wafaa'];
        if (!data[k]['wafaa']) delete data[k]['wafaa'];
        if (Object.keys(data[k]).length === 0) delete data[k];
        save();
        renderMonth();
          }, 500);
      el.classList.add('lp-active');
    }
    function cancelLP() {
      clearTimeout(lpTimer);
      el.classList.remove('lp-active');
    }

    el.addEventListener('touchstart', startLP, { passive: true });
    el.addEventListener('touchend', (e) => {
      cancelLP();
      if (!didLongPress) openDay(el.dataset.date);
    });
    el.addEventListener('touchmove', cancelLP, { passive: true });
    el.addEventListener('touchcancel', cancelLP);

    // Desktop: regular click
    el.addEventListener('click', (e) => {
      if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
      openDay(el.dataset.date);
    });
  });
}

// --- Day View ---
function renderDay() {
  const d = selectedDay;
  const k = dateKey(d);
  const items = itemsForDate(d);
  const dayData = data[k] || {};
  const { done, total } = progressForDate(d);

  $('dayTitle').textContent = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;

  let html = '';
  items.forEach(item => {
    const checked = dayData[item.id] ? ' checked' : '';
    html += `<div class="item-row" data-item="${item.id}">
      <div class="item-check${checked}">${dayData[item.id] ? '✓' : ''}</div>
      <div class="item-label">${item.label}</div>
    </div>`;
  });

  const wafaaDone = currentProfile === 'jihad' && dayData['wafaa'];
  const summaryRing = `<span class="ring-wrap">${progressRing(done, total, 36)}${wafaaDone ? '<span class="wafaa-check" style="font-size:16px">✓</span>' : ''}</span>`;
  html += `<div class="day-summary">${summaryRing} <span>${done} / ${total}</span></div>`;

  // Day navigation buttons
  html += `<div class="day-nav">
    <button id="prevDay">&#8249; Previous day</button>
    <button id="nextDay">Next day &#8250;</button>
  </div>`;

  $('dayView').innerHTML = html;

  $('dayView').querySelectorAll('.item-row').forEach(el => {
    el.addEventListener('click', () => {
      haptic();
      const itemId = el.dataset.item;
      if (!data[k]) data[k] = {};
      data[k][itemId] = !data[k][itemId];
      if (!data[k][itemId]) delete data[k][itemId];
      if (Object.keys(data[k]).length === 0) delete data[k];
      save();
      renderDay();
    });
  });

  // Day nav buttons
  document.getElementById('prevDay').addEventListener('click', () => navigateDay(-1));
  document.getElementById('nextDay').addEventListener('click', () => navigateDay(1));
}

function navigateDay(offset) {
  if (dayTransitioning) return;
  dayTransitioning = true;
  haptic();

  const dayEl = $('dayView');
  const outDir = offset > 0 ? '-100%' : '100%';
  const inDir = offset > 0 ? '100%' : '-100%';

  dayEl.style.transition = 'transform 0.18s ease-out, opacity 0.18s ease-out';
  dayEl.style.transform = `translateX(${outDir})`;
  dayEl.style.opacity = '0';

  setTimeout(() => {
    const d = new Date(selectedDay);
    d.setDate(d.getDate() + offset);
    selectedDay = d;
    renderDay();

    dayEl.style.transition = 'none';
    dayEl.style.transform = `translateX(${inDir})`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        dayEl.style.transition = 'transform 0.18s ease-out, opacity 0.18s ease-out';
        dayEl.style.transform = 'translateX(0)';
        dayEl.style.opacity = '1';
        setTimeout(() => {
          dayEl.style.transition = '';
          dayEl.style.transform = '';
          dayEl.style.opacity = '';
          dayTransitioning = false;
        }, 200);
      });
    });
  }, 180);
}

// --- Swipe on Day View ---
let touchStartX = 0;
let touchStartY = 0;
let swiping = false;

$('dayView').addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swiping = true;
}, { passive: true });

$('dayView').addEventListener('touchmove', (e) => {
  if (!swiping) return;
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dy > 30) swiping = false; // vertical scroll, cancel swipe
}, { passive: true });

$('dayView').addEventListener('touchend', (e) => {
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    navigateDay(dx < 0 ? 1 : -1);
  }
  swiping = false;
});

// --- Navigation ---
$('prevBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  render();
});
$('nextBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  render();
});
$('backBtn').addEventListener('click', goBack);

// --- Init ---
const saved = localStorage.getItem('checklist-profile');
if (saved && PROFILES[saved]) selectProfile(saved);
</script>
</body>
</html>

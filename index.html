<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100dvh; }

  #editBtn {
    position: fixed; bottom: 10px; right: 10px; width: 20px; height: 20px;
    background: #ccc; border: none; border-radius: 3px; cursor: pointer; z-index: 100;
    transition: background 0.2s;
  }
  #editBtn.active { background: #4caf50; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: #fff; border-bottom: 1px solid #e0e0e0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .nav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 10px; color: #555; }

  .view-toggle {
    display: flex; justify-content: center; gap: 0; padding: 12px 20px; background: #fff;
    border-bottom: 1px solid #e0e0e0;
  }
  .view-toggle button {
    flex: 1; max-width: 140px; padding: 8px 0; border: 1px solid #ddd; background: #f9f9f9;
    font-size: 14px; cursor: pointer; color: #555; transition: all 0.15s;
  }
  .view-toggle button:first-child { border-radius: 6px 0 0 6px; }
  .view-toggle button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .view-toggle button.active { background: #333; color: #fff; border-color: #333; }

  /* Month View */
  #monthView { padding: 12px; }
  .weekday-headers { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 8px 0; }
  .weekday-headers span { font-size: 12px; color: #999; font-weight: 500; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .month-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 14px; border-radius: 8px; cursor: pointer; position: relative;
    transition: background 0.15s;
  }
  .month-day:active { background: #e8e8e8; }
  .month-day.other-month { color: #ccc; }
  .month-day.today { font-weight: 700; color: #1a73e8; }
  .month-day .status { position: absolute; bottom: 1px; font-size: 14px; line-height: 1; }
  .month-day.state-check { background: #d4edda; }
  .month-day.state-cross { background: #f8d7da; }

  /* Week View */
  #weekView { padding: 16px; }
  .week-day {
    display: flex; align-items: center; padding: 16px; margin-bottom: 6px;
    background: #fff; border-radius: 10px; cursor: pointer;
    transition: background 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .week-day:active { background: #f0f0f0; }
  .week-day .day-info { flex: 1; }
  .week-day .day-name { font-size: 13px; color: #999; }
  .week-day .day-date { font-size: 16px; font-weight: 500; margin-top: 2px; }
  .week-day .day-date.today { color: #1a73e8; font-weight: 700; }
  .week-day .check { font-size: 24px; width: 36px; text-align: center; }
  .week-day .check.empty { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 5px; }
  .week-day.state-check { background: #d4edda; }
  .week-day.state-cross { background: #f8d7da; }
</style>
</head>
<body>

<button id="editBtn" title="Toggle edit"></button>

<header>
  <button class="nav-btn" id="prevBtn">&#8249;</button>
  <h1 id="headerTitle"></h1>
  <button class="nav-btn" id="nextBtn">&#8250;</button>
</header>

<div class="view-toggle">
  <button id="monthToggle" class="active">Month</button>
  <button id="weekToggle">Week</button>
</div>

<div id="monthView"></div>
<div id="weekView" style="display:none"></div>

<script>
const STATES = ['', '\u2705', '\u274C'];
const API = 'https://s6o2vypvkdkmtbws4cc6lvacdq0ajkvo.lambda-url.eu-central-1.on.aws/';
let data = {};
let view = 'month';
let currentDate = new Date();
let editMode = false;

const $ = id => document.getElementById(id);
const key = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const isToday = d => key(d) === key(new Date());
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

async function load() {
  try { data = await fetch(API).then(r => r.json()); } catch(e) { console.error('Load failed', e); }
  render();
}
async function save() {
  try { await fetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); } catch(e) { console.error('Save failed', e); }
}
function stCls(st) { return st === '\u2705' ? ' state-check' : st === '\u274C' ? ' state-cross' : ''; }

function cycleState(dateKey) {
  if (!editMode) return;
  const cur = data[dateKey] || '';
  const idx = STATES.indexOf(cur);
  const next = STATES[(idx + 1) % STATES.length];
  if (next) data[dateKey] = next; else delete data[dateKey];
  save();
  render();
}

function getWeekStart(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay());
  return dt;
}

function setView(v) {
  view = v;
  $('monthToggle').classList.toggle('active', v === 'month');
  $('weekToggle').classList.toggle('active', v === 'week');
  $('monthView').style.display = v === 'month' ? '' : 'none';
  $('weekView').style.display = v === 'week' ? '' : 'none';
  render();
}

function render() {
  if (view === 'month') renderMonth();
  else renderWeek();
}

function renderMonth() {
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  $('headerTitle').textContent = `${MONTHS[month]} ${year}`;

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();

  let html = '<div class="weekday-headers">' + DAYS.map(d => `<span>${d}</span>`).join('') + '</div><div class="month-grid">';

  // Previous month padding
  for (let i = 0; i < startDay; i++) {
    const d = new Date(year, month, -(startDay - 1 - i));
    const k = key(d);
    const st = data[k] || '';
    html += `<div class="month-day other-month${stCls(st)}" data-week="${getWeekStart(d).toISOString()}">${d.getDate()}${st ? `<span class="status">${st}</span>` : ''}</div>`;
  }

  // Current month
  for (let i = 1; i <= last.getDate(); i++) {
    const d = new Date(year, month, i);
    const k = key(d);
    const st = data[k] || '';
    const todayCls = isToday(d) ? ' today' : '';
    html += `<div class="month-day${todayCls}${stCls(st)}" data-week="${getWeekStart(d).toISOString()}">${i}${st ? `<span class="status">${st}</span>` : ''}</div>`;
  }

  // Next month padding
  const remaining = (7 - ((startDay + last.getDate()) % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    const k = key(d);
    const st = data[k] || '';
    html += `<div class="month-day other-month${stCls(st)}" data-week="${getWeekStart(d).toISOString()}">${i}${st ? `<span class="status">${st}</span>` : ''}</div>`;
  }

  html += '</div>';
  $('monthView').innerHTML = html;

  $('monthView').querySelectorAll('.month-day').forEach(el => {
    el.addEventListener('click', () => {
      currentDate = new Date(el.dataset.week);
      setView('week');
    });
  });
}

function renderWeek() {
  const ws = getWeekStart(currentDate);
  const we = new Date(ws);
  we.setDate(we.getDate() + 6);

  const fmt = d => `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  $('headerTitle').textContent = `${fmt(ws)} – ${fmt(we)}`;

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const k = key(d);
    const st = data[k] || '';
    const todayCls = isToday(d) ? ' today' : '';

    html += `<div class="week-day${stCls(st)}" data-key="${k}">
      <div class="day-info">
        <div class="day-name">${DAYS[d.getDay()]}</div>
        <div class="day-date${todayCls}">${MONTHS[d.getMonth()]} ${d.getDate()}</div>
      </div>
      ${st ? `<div class="check">${st}</div>` : '<div class="check empty"></div>'}
    </div>`;
  }

  $('weekView').innerHTML = html;

  $('weekView').querySelectorAll('.week-day').forEach(el => {
    el.addEventListener('click', () => cycleState(el.dataset.key));
  });
}

// Navigation
$('prevBtn').addEventListener('click', () => {
  if (view === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
  else currentDate.setDate(currentDate.getDate() - 7);
  render();
});
$('nextBtn').addEventListener('click', () => {
  if (view === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
  else currentDate.setDate(currentDate.getDate() + 7);
  render();
});

// View toggles
$('monthToggle').addEventListener('click', () => setView('month'));
$('weekToggle').addEventListener('click', () => setView('week'));

// Edit toggle
$('editBtn').addEventListener('click', () => {
  editMode = !editMode;
  $('editBtn').classList.toggle('active', editMode);
});

load();
</script>
</body>
</html>
